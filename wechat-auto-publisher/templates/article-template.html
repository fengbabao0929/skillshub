<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}}</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      line-height: 1.6;
      color: #333;
      max-width: 677px;
      margin: 0 auto;
      padding: 20px;
    }
    h1, h2, h3, h4, h5, h6 {
      margin-top: 24px;
      margin-bottom: 16px;
      font-weight: 600;
      line-height: 1.25;
    }
    h1 { font-size: 32px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
    h2 { font-size: 24px; border-bottom: 1px solid #eee; padding-bottom: 8px; }
    h3 { font-size: 20px; }
    p { margin-bottom: 16px; }
    img { max-width: 100%; height: auto; display: block; margin: 20px 0; }
    blockquote {
      border-left: 4px solid #ddd;
      padding-left: 16px;
      margin: 20px 0;
      color: #666;
    }
    code {
      background: #f5f5f5;
      padding: 2px 6px;
      border-radius: 3px;
      font-family: "Consolas", "Monaco", monospace;
    }
    pre {
      background: #f5f5f5;
      padding: 16px;
      border-radius: 5px;
      overflow-x: auto;
    }
    pre code {
      background: none;
      padding: 0;
    }
    ul, ol { padding-left: 24px; }
    a { color: #576b95; text-decoration: none; }
    table {
      border-collapse: collapse;
      width: 100%;
      margin: 20px 0;
    }
    table th, table td {
      border: 1px solid #ddd;
      padding: 8px 12px;
      text-align: left;
    }
    table th {
      background: #f5f5f5;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <h1>{{title}}</h1>
  {{author}}<p style="color: #888; font-size: 14px;">{{author}}</p>
  {{/author}}
  <hr>
  {{content}}
</body>
</html>
